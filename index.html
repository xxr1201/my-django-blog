<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的技术博客</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        /* 顶部渐变横幅 */
        .banner {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }
        .banner h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .banner p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* 导航栏 */
        nav {
            background-color: #2c3e50;
            display: flex;
            gap: 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 1rem;
            transition: background 0.2s;
        }
        nav a.active {
            background-color: #3498db;
        }
        nav a:hover {
            background-color: #34495e;
        }

        /* 主容器：两栏布局 */
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* 文章卡片 */
        .card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 25px;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        .post-item {
            margin-bottom: 15px;
        }
        .post-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .post-date {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .read-more {
            color: #3498db;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* 侧边栏卡片 */
        .sidebar .card {
            text-align: center;
        }
        .sidebar .card h3 {
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #3498db;
            display: inline-block;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #ddd;
            margin: 0 auto 15px;
            background-image: url("https://picsum.photos/200/200");
            background-size: cover;
        }
        .time-display {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #333;
        }
        .social-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .social-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            margin-top: 30px;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部横幅 -->
    <div class="banner">
        <h1>我的技术博客</h1>
        <p>记录前端与 Python 学习之路</p>
    </div>

    <!-- 导航栏 -->
    <nav>
        <a href="#" class="active">首页</a>
        <a href="#">文章</a>
        <a href="#">关于我</a>
    </nav>

    <!-- 主内容区 -->
    <div class="container">
        <!-- 左侧文章区 -->
        <div class="main-content">
            <div class="card">
                <h2>最新文章</h2>
                <div class="post-item">
                    <div class="post-title">我的博客</div>
                    <div class="post-date">2026-04-19</div>
                    <p>这是我做的第一个博客！...</p>
                    <a href="#" class="read-more">阅读全文</a>
                </div>
            </div>
        </div>

        <!-- 右侧侧边栏 -->
        <div class="sidebar">
            <!-- 关于作者 -->
            <div class="card">
                <h3>关于作者</h3>
                <div class="avatar"></div>
                <p>xxr，热爱编程的学习者，专注前端、Python与全栈开发。喜欢记录、分享与总结，希望用文字帮助更多同行成长。</p>
            </div>

            <!-- 当前时间 -->
            <div class="card">
                <h3>当前时间</h3>
                <div class="time-display" id="current-time"></div>
            </div>

            <!-- 关注我 -->
            <div class="card">
                <h3>关注我</h3>
                <div class="social-links">
                    <a href="#" class="social-btn">GitHub</a>
                    <a href="#" class="social-btn">知乎</a>
                </div>
            </div>

            <!-- 订阅更新 -->
            <div class="card">
                <h3>订阅更新</h3>
                <p>获取最新技术文章，每周一篇</p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        © 2025 我的技术博客 | Powered by Django
    </footer>

    <!-- 动态时间脚本 -->
    <script>
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('current-time').textContent = timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
